<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Zchord</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #161616;
            --accent-gold: #d4af37;
            --accent-soft: #8c7335;
            --text-main: #e0e0e0;
            --text-dim: #888;
            --danger: #ff4d4d;
            --border-color: #2a2415;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            line-height: 1.6;
        }

        .navbar { 
            background: rgba(5, 5, 5, 0.95); 
            padding: 15px 25px; 
            border-bottom: 1px solid var(--border-color); 
            display: flex; 
            justify-content: space-between;
            align-items: center;
        }
        .navbar a { color: var(--accent-soft); text-decoration: none; font-size: 14px; transition: 0.3s; }
        .navbar a:hover { color: var(--accent-gold); }

        .container { width: 90%; max-width: 900px; margin: 40px auto; }
        
        h2 { color: var(--accent-gold); font-weight: 600; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }

        /* Form Styling */
        .admin-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 40px;
        }

        .form-group { margin-bottom: 20px; }
        label { display: block; color: var(--accent-soft); margin-bottom: 8px; font-size: 14px; }
        
        input, textarea, select {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px 15px;
            color: #fff;
            font-family: 'Kanit', sans-serif;
            font-size: 16px;
            transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--accent-gold); outline: none; background: #111; }

        .btn-save {
            background: var(--accent-gold);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 12px;
            width: 100%;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-save:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4); }

        /* Song List Styling */
        .song-item {
            background: #1a1a1a;
            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid transparent;
            transition: 0.3s;
        }
        .song-item:hover { border-color: var(--border-color); background: #222; }
        
        .song-info h4 { color: var(--accent-gold); font-weight: 500; font-size: 18px; }
        .song-info p { color: var(--text-dim); font-size: 13px; }

        .song-actions { display: flex; gap: 10px; }
        .btn-edit { color: var(--accent-gold); background: none; border: 1px solid var(--accent-gold); padding: 5px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; transition: 0.3s; }
        .btn-edit:hover { background: var(--accent-gold); color: #000; }
        
        .btn-delete { color: var(--danger); background: none; border: 1px solid var(--danger); padding: 5px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; transition: 0.3s; }
        .btn-delete:hover { background: var(--danger); color: #fff; }

        @media (max-width: 600px) {
            .song-item { flex-direction: column; align-items: flex-start; gap: 15px; }
            .song-actions { width: 100%; justify-content: flex-end; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="main.html">กลับไปหน้าหลัก</a>
        <span style="color: var(--accent-gold); font-weight: 600; letter-spacing: 1px;">ZCHORD ADMIN</span>
    </nav>

    <div class="container">
        <h2 id="form-title">เพิ่มเพลงใหม่</h2>
        <div class="admin-card">
            <div class="form-group">
                <label>ชื่อเพลง</label>
                <input type="text" id="song-name" placeholder="เช่น วัดใจ">
            </div>
            <div class="form-group">
                <label>ชื่อศิลปิน</label>
                <input type="text" id="artist" placeholder="เช่น Silly Fools">
            </div>
            <div class="form-group">
                <label>คีย์เริ่มต้น (Key)</label>
                <select id="key">
                    <option value="C">C</option><option value="C#">C#</option>
                    <option value="D">D</option><option value="D#">D#</option>
                    <option value="E">E</option><option value="F">F</option>
                    <option value="F#">F#</option><option value="G">G</option>
                    <option value="G#">G#</option><option value="A">A</option>
                    <option value="A#">A#</option><option value="B">B</option>
                </select>
            </div>
            <div class="form-group">
                <label>เนื้อเพลงและคอร์ด (เว้น 1 บรรทัดเพื่อแยกท่อน)</label>
                <textarea id="content" rows="12" placeholder="C   G&#10;เนื้อเพลง..."></textarea>
            </div>
            <button class="btn-save" id="btn-save">บันทึกข้อมูลเพลง</button>
        </div>

        <h2>รายการเพลงทั้งหมด</h2>
        <div id="song-list">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBnEBJuuSMYo502UdBaq5HSRY4SLyurvFw",
            authDomain: "zchord-6ce66.firebaseapp.com",
            projectId: "zchord-6ce66",
            storageBucket: "zchord-6ce66.firebasestorage.app",
            messagingSenderId: "821179472335",
            appId: "1:821179472335:web:52a81224471854ee9adaba"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const songsCol = collection(db, "songs");

        let editId = null;

        // ดึงข้อมูลเพลงมาแสดง
        onSnapshot(songsCol, (snapshot) => {
            const listDiv = document.getElementById("song-list");
            listDiv.innerHTML = "";
            snapshot.forEach((sDoc) => {
                const song = sDoc.data();
                listDiv.innerHTML += `
                    <div class="song-item">
                        <div class="song-info">
                            <h4>${song.name}</h4>
                            <p>${song.artist} • Key: ${song.key}</p>
                        </div>
                        <div class="song-actions">
                            <button class="btn-edit" onclick="prepareEdit('${sDoc.id}', '${song.name}', '${song.artist}', '${song.key}', \`${song.content.replace(/`/g, '\\`')}\`)">แก้ไขเพลง</button>
                            <button class="btn-delete" onclick="deleteSong('${sDoc.id}')">ลบเพลง</button>
                        </div>
                    </div>
                `;
            });
        });

        // ฟังก์ชันบันทึก/อัปเดต
        document.getElementById("btn-save").onclick = async () => {
            const data = {
                name: document.getElementById("song-name").value,
                artist: document.getElementById("artist").value,
                key: document.getElementById("key").value,
                content: document.getElementById("content").value
            };

            if (editId) {
                await updateDoc(doc(db, "songs", editId), data);
                editId = null;
                document.getElementById("form-title").innerText = "เพิ่มเพลงใหม่";
                document.getElementById("btn-save").innerText = "บันทึกข้อมูลเพลง";
            } else {
                await addDoc(songsCol, data);
            }
            // Clear ฟอร์ม
            document.querySelectorAll("input, textarea").forEach(el => el.value = "");
        };

        window.deleteSong = async (id) => {
            if(confirm("ยืนยันว่าจะลบเพลงนี้?")) await deleteDoc(doc(db, "songs", id));
        };

        window.prepareEdit = (id, name, artist, key, content) => {
            editId = id;
            document.getElementById("song-name").value = name;
            document.getElementById("artist").value = artist;
            document.getElementById("key").value = key;
            document.getElementById("content").value = content;
            document.getElementById("form-title").innerText = "กำลังแก้ไขเพลง: " + name;
            document.getElementById("btn-save").innerText = "อัปเดตข้อมูลเพลง";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };
    </script>
</body>
</html>
