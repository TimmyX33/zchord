<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แสดงคอร์ดเพลง - Zchord</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Kanit', sans-serif; background-color: #0d0d0d; color: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .navbar { width: 100%; background-color: #050505; padding: 12px 20px; border-bottom: 1px solid #1f1a0e; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .nav-links a { color: #8c7335; text-decoration: none; font-size: 14px; margin-right: 15px; transition: color 0.3s; }
        .nav-links a:hover { color: #d4af37; }
        .play-container { width: 95%; max-width: 1400px; margin-top: 30px; margin-bottom: 60px; }
        .song-header { text-align: center; margin-bottom: 25px; }
        #display-song-name { font-size: 36px; color: #d4af37; font-weight: 500; margin-bottom: 5px; }
        #display-artist { font-size: 16px; color: #888; }
        .view-controls { display: flex; justify-content: center; gap: 8px; margin-bottom: 25px; flex-wrap: wrap; }
        .view-btn { background: transparent; color: #8c7335; border: 1px solid #2a2415; padding: 6px 16px; border-radius: 20px; cursor: pointer; font-size: 13px; transition: 0.3s; }
        .view-btn.active { background: linear-gradient(135deg, #bfa356, #8c7335); color: #000; font-weight: 500; }
        .control-bar { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; background-color: #121212; padding: 10px 20px; border-radius: 30px; border: 1px solid #1f1a0e; width: fit-content; margin: 0 auto 40px; }
        .btn-circle { width: 36px; height: 36px; border-radius: 50%; background-color: #0a0a0a; color: #d4af37; border: 1px solid #4a3c1c; cursor: pointer; font-size: 18px; }
        .key-badge { color: #d4af37; padding: 0 15px; font-size: 16px; min-width: 90px; text-align: center; line-height: 36px; }

        .lyrics-sheet { 
            width: 100%; 
            margin: 0 auto; 
            transition: all 0.3s; 
        }
        
        .layout-horizontal { 
            column-width: 380px; 
            column-gap: 50px; 
        }
        
        .layout-vertical { 
            column-count: 1; 
            column-width: auto; 
            max-width: 300px; 
        }
        
        .verse-container { 
            break-inside: avoid; 
            page-break-inside: avoid; 
            width: 100%; 
            margin-bottom: 35px; 
        }
        
        .verse-block { 
            display: block; 
            text-align: left;
        }
        
        .chord-line { color: #d4af37; font-weight: 600; white-space: pre; font-family: 'Courier New', monospace; margin-bottom: 2px; }
        .lyric-line { color: #e0e0e0; white-space: pre; font-family: 'Courier New', monospace; margin-bottom: 12px; }
    
        
    </style>
</head>
<body>
    <nav class="navbar">
        <div style="color: var(--accent-gold); font-weight: 600; letter-spacing: 2px;">ZCHORD</div>
    </nav>

    <div class="play-container">
        <div class="song-header">
            <h1 id="display-song-name">กำลังโหลดข้อมูลคลาวด์...</h1>
            <p id="display-artist">-</p>
        </div>

        <div class="view-controls">
            <button id="btn-edit-song" class="view-btn" style="border-color: #d4af37; display:none;">แก้ไขเนื้อเพลง</button>
            <button id="btn-horizontal" class="view-btn">▦ Horizontal</button>
            <button id="btn-vertical" class="view-btn active">▤ Vertical</button>
        </div>

        <div class="control-bar">
            <button id="btn-down" class="btn-circle">-</button>
            <div class="key-badge">Key: <span id="display-key">C</span></div>
            <button id="btn-up" class="btn-circle">+</button>
        </div>

        <div class="lyrics-sheet layout-vertical" id="lyrics-display"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBnEBJuuSMYo502UdBaq5HSRY4SLyurvFw",
            authDomain: "zchord-6ce66.firebaseapp.com",
            projectId: "zchord-6ce66",
            storageBucket: "zchord-6ce66.firebasestorage.app",
            messagingSenderId: "821179472335",
            appId: "1:821179472335:web:52a81224471854ee9adaba"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- ระบบ Transpose พื้นฐาน ---
        const notes = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        const flatAliases = { "Db": "C#", "Eb": "D#", "Gb": "F#", "Ab": "G#", "Bb": "A#" };
        let currentStep = 0, originalKeyNote = "C"; 

        function applyTranspose() {
            document.getElementById('display-key').textContent = notes[(notes.indexOf(flatAliases[originalKeyNote]||originalKeyNote) + currentStep + 120) % 12];
            document.querySelectorAll('.chord-line').forEach(line => {
                line.textContent = line.getAttribute('data-orig').replace(/(\S+)/g, match => {
                    let m = match.match(/^([CDEFGAB][#b]?)(.*)$/);
                    if(!m) return match;
                    let idx = notes.indexOf(flatAliases[m[1]]||m[1]);
                    return idx === -1 ? match : notes[(idx + currentStep + 120) % 12] + m[2];
                });
            });
        }
        document.getElementById('btn-up').addEventListener('click', () => { currentStep++; applyTranspose(); });
        document.getElementById('btn-down').addEventListener('click', () => { currentStep--; applyTranspose(); });

        // --- ปุ่ม Layout สลับโหมด ---
        const sheet = document.getElementById('lyrics-display');
        document.getElementById('btn-horizontal').addEventListener('click', (e) => { 
            sheet.className='lyrics-sheet layout-horizontal'; 
            e.target.classList.add('active'); 
            document.getElementById('btn-vertical').classList.remove('active');
        });
        document.getElementById('btn-vertical').addEventListener('click', (e) => { 
            sheet.className='lyrics-sheet layout-vertical'; 
            e.target.classList.add('active'); 
            document.getElementById('btn-horizontal').classList.remove('active');
        });

        // --- ดึงข้อมูลเพลงแบบ Real-time จาก Firebase ---
        const targetId = new URLSearchParams(window.location.search).get('id');
        
        if (targetId) {
            document.getElementById('btn-edit-song').style.display = 'inline-block';
            document.getElementById('btn-edit-song').onclick = () => window.location.href = `admin.html?edit=${targetId}`;

            onSnapshot(doc(db, "songs", targetId), (docSnap) => {
                if(docSnap.exists()) {
                    const songData = docSnap.data();
                    document.getElementById('display-song-name').textContent = songData.name;
                    document.getElementById('display-artist').textContent = songData.artist;
                    originalKeyNote = songData.key.trim();
                    currentStep = 0; 
                    document.getElementById('display-key').textContent = originalKeyNote;
                    
                    let finalHTML = '', currentBlockHTML = ''; 
                    songData.content.split('\n').forEach(line => {
                        if (line.trim() === '') {
                            if (currentBlockHTML) { finalHTML += `<div class="verse-container"><div class="verse-block">${currentBlockHTML}</div></div>`; currentBlockHTML = ''; }
                        } else {
                            currentBlockHTML += !/[ก-๙]/.test(line) ? `<div class="chord-line" data-orig="${line}">${line}</div>` : `<div class="lyric-line">${line}</div>`;
                        }
                    });
                    if (currentBlockHTML) finalHTML += `<div class="verse-container"><div class="verse-block">${currentBlockHTML}</div></div>`;
                    sheet.innerHTML = finalHTML;
                } else {
                    document.getElementById('display-song-name').textContent = "ไม่พบเพลงนี้";
                    sheet.innerHTML = '<p style="color:#777; text-align:center;">เพลงนี้อาจถูกลบไปแล้ว</p>';
                }
            });
        } else {
            document.getElementById('display-song-name').textContent = "ไม่มีการระบุเพลง";
            sheet.innerHTML = '<p style="color:#777; text-align:center;">โปรดเลือกเพลงจากหน้าแรกครับ</p>';
        }
    </script>
</body>
</html>
