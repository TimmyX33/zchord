<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แสดงคอร์ดเพลง - Zchord</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #161616;
            --accent-gold: #d4af37;
            --accent-soft: #8c7335;
            --text-main: #e0e0e0;
            --text-dim: #888;
            --border-color: #2a2415;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        /* Navbar */
        .navbar { 
            width: 100%; 
            background: rgba(5, 5, 5, 0.95); 
            backdrop-filter: blur(10px);
            padding: 15px 25px; 
            border-bottom: 1px solid var(--border-color); 
            display: flex; 
            justify-content: space-between; 
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-links a { 
            color: var(--accent-soft); 
            text-decoration: none; 
            font-size: 15px; 
            margin-right: 20px; 
            transition: 0.3s; 
            font-weight: 400;
        }
        .nav-links a:hover { color: var(--accent-gold); }

        .play-container { 
            width: 90%; 
            max-width: 1200px; 
            margin-top: 40px; 
            margin-bottom: 80px; 
        }

        /* Header */
        .song-header { text-align: center; margin-bottom: 35px; }
        #display-song-name { 
            font-size: clamp(32px, 5vw, 48px); 
            color: var(--accent-gold); 
            font-weight: 600; 
            margin-bottom: 8px; 
            letter-spacing: -0.5px;
        }
        #display-artist { font-size: 18px; color: var(--text-dim); font-weight: 300; }

        /* Controls */
        .view-controls { display: flex; justify-content: center; gap: 12px; margin-bottom: 30px; }
        .view-btn { 
            background: #1a1a1a; 
            color: var(--text-dim); 
            border: 1px solid var(--border-color); 
            padding: 8px 20px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 14px; 
            transition: 0.3s; 
        }
        .view-btn.active { 
            background: var(--accent-gold); 
            color: #000; 
            border-color: var(--accent-gold);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
            font-weight: 500;
        }

        .control-bar { 
            display: flex; 
            align-items: center;
            justify-content: center; 
            gap: 20px; 
            background: var(--card-bg); 
            padding: 12px 25px; 
            border-radius: 50px; 
            border: 1px solid var(--border-color); 
            width: fit-content; 
            margin: 0 auto 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .btn-circle { 
            width: 42px; 
            height: 42px; 
            border-radius: 50%; 
            background: #222; 
            color: var(--accent-gold); 
            border: 1px solid var(--border-color); 
            cursor: pointer; 
            font-size: 20px; 
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .btn-circle:hover { background: #333; transform: scale(1.1); }
        .key-badge { 
            color: var(--text-main); 
            font-size: 18px; 
            font-weight: 500;
            min-width: 100px; 
            text-align: center; 
        }
        #display-key { color: var(--accent-gold); font-weight: 600; font-size: 22px; margin-left: 5px; }

        /* --- Lyrics Layout (The "Beautiful" Part) --- */
        .lyrics-sheet { 
            width: 100%; 
            transition: all 0.5s ease;
        }

        /* ▦ Horizontal Mode */
        .layout-horizontal { 
            column-width: 400px; 
            column-gap: 60px; 
            column-rule: 1px solid #1a1a1a;
        }

        /* ▤ Vertical Mode */
        .layout-vertical { 
            display: flex;
            flex-direction: column;
            align-items: center; /* จัดกลุ่มเนื้อเพลงให้อยู่กลางจอ */
        }

        .verse-container { 
            break-inside: avoid; 
            margin-bottom: 45px; 
            width: 100%;
            max-width: 600px; /* คุมความกว้างไม่ให้แผ่กระจายเกินไป */
        }

        .verse-block { 
            display: block; 
            text-align: left; /* บังคับเนื้อเพลงชิดซ้ายของกลุ่มตัวเองเสมอ */
            padding-left: 20px;
            border-left: 2px solid transparent;
            transition: border-color 0.3s;
        }
        .verse-block:hover { border-left-color: var(--accent-gold); }

        .chord-line { 
            color: var(--accent-gold); 
            font-weight: 600; 
            white-space: pre; 
            font-family: 'Courier New', monospace; 
            font-size: 1.15em;
            margin-bottom: 4px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }
        .lyric-line { 
            color: var(--text-main); 
            white-space: pre; 
            font-family: 'Kanit', sans-serif; 
            font-size: 1.1em;
            margin-bottom: 18px; 
            opacity: 0.9;
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .play-container { width: 95%; }
            #display-song-name { font-size: 28px; }
            .control-bar { padding: 8px 15px; gap: 10px; }
            .verse-block { padding-left: 10px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-links">
            <a href="main.html">Home</a>
            <a href="admin.html">Admin</a>
        </div>
        <div style="color: var(--accent-gold); font-weight: 600; letter-spacing: 2px;">ZCHORD</div>
    </nav>

    <div class="play-container">
        <div class="song-header">
            <h1 id="display-song-name">Loading...</h1>
            <p id="display-artist">Please wait a moment</p>
        </div>

        <div class="view-controls">
            <button id="btn-horizontal" class="view-btn">▦ Horizontal</button>
            <button id="btn-vertical" class="view-btn active">▤ Vertical</button>
        </div>

        <div class="control-bar">
            <button id="btn-down" class="btn-circle">−</button>
            <div class="key-badge">KEY <span id="display-key">C</span></div>
            <button id="btn-up" class="btn-circle">+</button>
        </div>

        <div class="lyrics-sheet layout-vertical" id="lyrics-display"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBnEBJuuSMYo502UdBaq5HSRY4SLyurvFw",
            authDomain: "zchord-6ce66.firebaseapp.com",
            projectId: "zchord-6ce66",
            storageBucket: "zchord-6ce66.firebasestorage.app",
            messagingSenderId: "821179472335",
            appId: "1:821179472335:web:52a81224471854ee9adaba"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const notes = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        const flatAliases = { "Db": "C#", "Eb": "D#", "Gb": "F#", "Ab": "G#", "Bb": "A#" };
        let currentStep = 0, originalKeyNote = "C"; 

        function applyTranspose() {
            document.getElementById('display-key').textContent = notes[(notes.indexOf(flatAliases[originalKeyNote]||originalKeyNote) + currentStep + 120) % 12];
            document.querySelectorAll('.chord-line').forEach(line => {
                line.textContent = line.getAttribute('data-orig').replace(/(\S+)/g, match => {
                    let m = match.match(/^([CDEFGAB][#b]?)(.*)$/);
                    if(!m) return match;
                    let idx = notes.indexOf(flatAliases[m[1]]||m[1]);
                    return idx === -1 ? match : notes[(idx + currentStep + 120) % 12] + m[2];
                });
            });
        }
        document.getElementById('btn-up').addEventListener('click', () => { currentStep++; applyTranspose(); });
        document.getElementById('btn-down').addEventListener('click', () => { currentStep--; applyTranspose(); });

        const sheet = document.getElementById('lyrics-display');
        document.getElementById('btn-horizontal').addEventListener('click', (e) => { 
            sheet.className='lyrics-sheet layout-horizontal'; 
            e.target.classList.add('active'); 
            document.getElementById('btn-vertical').classList.remove('active');
        });
        document.getElementById('btn-vertical').addEventListener('click', (e) => { 
            sheet.className='lyrics-sheet layout-vertical'; 
            e.target.classList.add('active'); 
            document.getElementById('btn-horizontal').classList.remove('active');
        });

        const targetId = new URLSearchParams(window.location.search).get('id');
        
        if (targetId) {
            onSnapshot(doc(db, "songs", targetId), (docSnap) => {
                if(docSnap.exists()) {
                    const songData = docSnap.data();
                    document.getElementById('display-song-name').textContent = songData.name;
                    document.getElementById('display-artist').textContent = songData.artist;
                    originalKeyNote = songData.key.trim();
                    currentStep = 0; 
                    document.getElementById('display-key').textContent = originalKeyNote;
                    
                    let finalHTML = '', currentBlockHTML = ''; 
                    songData.content.split('\n').forEach(line => {
                        if (line.trim() === '') {
                            if (currentBlockHTML) { 
                                finalHTML += `<div class="verse-container"><div class="verse-block">${currentBlockHTML}</div></div>`; 
                                currentBlockHTML = ''; 
                            }
                        } else {
                            currentBlockHTML += !/[ก-๙]/.test(line) ? 
                                `<div class="chord-line" data-orig="${line}">${line}</div>` : 
                                `<div class="lyric-line">${line}</div>`;
                        }
                    });
                    if (currentBlockHTML) finalHTML += `<div class="verse-container"><div class="verse-block">${currentBlockHTML}</div></div>`;
                    sheet.innerHTML = finalHTML;
                }
            });
        }
    </script>
</body>
</html>
